# Provii Demos Release Pipeline
# SLSA Level 3 compliant release with provenance and signing
#
# Triggers: Git tags matching v*.*.*
# Artifacts: Demo package tarballs with SBOM, signatures, and provenance

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ======================================================================
  # Build Demo Packages
  # ======================================================================
  build:
    name: Build Demo Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts

          # Package backends (excluding dependencies and build artifacts)
          tar -czvf "release-artifacts/provii-demos-backends-${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.gradle' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='venv' \
            --exclude='.wrangler' \
            backends/

          # Package mobile apps (excluding dependencies and build artifacts)
          tar -czvf "release-artifacts/provii-demos-apps-${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='Pods' \
            --exclude='.gradle' \
            --exclude='build' \
            --exclude='DerivedData' \
            --exclude='.dart_tool' \
            apps/

          # Package web demo
          tar -czvf "release-artifacts/provii-demos-web-${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.wrangler' \
            demo-web-provii-agegate/

      - name: Generate individual checksums
        working-directory: release-artifacts
        run: |
          for file in *.tar.gz; do
            sha256sum "$file" > "${file}.sha256"
          done
          sha256sum *.tar.gz > CHECKSUMS.txt

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          cd release-artifacts
          HASHES=$(sha256sum *.tar.gz | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'release-artifacts/*.tar.gz'

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: release-artifacts/
          retention-days: 1

  # ======================================================================
  # Generate SBOM
  # ======================================================================
  sbom:
    name: Generate SBOM
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          upload-release-assets: false
          path: .
          format: spdx-json
          output-file: provii-demos-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: provii-demos-sbom.spdx.json
          retention-days: 1

  # ======================================================================
  # Sign Artifacts with Sigstore
  # ======================================================================
  sign-artifacts:
    name: Sign Artifacts
    needs: [build, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: artifacts/

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: artifacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts with Sigstore (keyless)
        working-directory: artifacts
        run: |
          # Sign each tarball
          for file in *.tar.gz; do
            cosign sign-blob \
              --yes \
              --bundle "${file}.cosign-bundle" \
              "$file"
          done

          # Sign the SBOM
          cosign sign-blob \
            --yes \
            --bundle "provii-demos-sbom.spdx.json.cosign-bundle" \
            "provii-demos-sbom.spdx.json"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-artifacts
          path: artifacts/
          retention-days: 1

  # ======================================================================
  # SLSA Level 3 Provenance
  # ======================================================================
  provenance:
    name: Generate SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: false

  # ======================================================================
  # Create GitHub Release
  # ======================================================================
  release:
    name: Create Release
    needs: [build, sign-artifacts, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Download signed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-artifacts
          path: release/

      - name: Download SLSA provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: multiple.intoto.jsonl
          path: release/

      - name: Rename provenance file
        working-directory: release
        run: mv multiple.intoto.jsonl provii-demos.intoto.jsonl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: "Provii Demos v${{ needs.build.outputs.version }}"
          body: |
            ## Provii Demos v${{ needs.build.outputs.version }}

            ### Included Packages
            - **backends**: Issuer and verifier demo backends (Node.js, Go, Python, Cloudflare Workers)
            - **apps**: Mobile app demos (Android, iOS, React Native, Flutter)
            - **web**: Web age gate demo (TypeScript/Cloudflare Workers)

            ### Verification

            All artifacts are signed with Sigstore and include SLSA Level 3 provenance.

            #### Verify checksums
            ```bash
            sha256sum -c CHECKSUMS.txt
            ```

            #### Verify Sigstore signatures
            ```bash
            cosign verify-blob \
              --bundle provii-demos-backends-${{ needs.build.outputs.version }}.tar.gz.cosign-bundle \
              --certificate-identity-regexp="https://github.com/provii/provii-demos/.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              provii-demos-backends-${{ needs.build.outputs.version }}.tar.gz
            ```

            #### Verify SLSA provenance
            ```bash
            slsa-verifier verify-artifact \
              provii-demos-backends-${{ needs.build.outputs.version }}.tar.gz \
              --provenance-path provii-demos.intoto.jsonl \
              --source-uri github.com/provii/provii-demos
            ```
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
